    <!-- CSS async loader to prevent render-blocking -->
    <script>
      (function(){
        function makeAsync(link){
          if(link.rel==='stylesheet'&&link.href&&!link.dataset.critical){
            link.media='print';
            link.onload=function(){this.media='all';this.onload=null};
          }
        }
        var obs=new MutationObserver(function(m){
          m.forEach(function(mut){
            mut.addedNodes.forEach(function(n){
              if(n.tagName==='LINK')makeAsync(n);
            });
          });
        });
        obs.observe(document.documentElement,{childList:true,subtree:true});
        document.querySelectorAll('link[rel="stylesheet"]').forEach(makeAsync);
      })();
    </script>

      /* Prevent CLS from lazy sections */
      section{contain:layout style}
      /* Hero content stability */
      .hero-instant{contain:strict;content-visibility:auto}
    </style>
    
    <!-- Google Analytics - heavily deferred to reduce TTI impact -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {analytics_storage: 'denied', ad_storage: 'denied'});
      function loadGA() {
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-B1MKM2FPV7';
        document.head.appendChild(s);
        gtag('js', new Date());
        gtag('config', 'G-B1MKM2FPV7', {send_page_view: false});
      }
      // Defer GA to after page is fully interactive (longer timeout)
      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadGA, {timeout: 8000});
      } else {
        setTimeout(loadGA, 5000);
      }
    </script>

    <!-- App root - React renders instantly, no pre-rendered content to avoid hydration mismatch -->
    <div id="root"></div>
    
    <!-- Service Worker Registration - deferred to reduce main-thread blocking -->
    <script>
      // Use requestIdleCallback to defer SW registration out of critical path
      function registerSW() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('/sw.js').catch(function(){});
        }
      }
      if ('requestIdleCallback' in window) {
        requestIdleCallback(registerSW, { timeout: 5000 });
      } else {
        setTimeout(registerSW, 3000);
      }
    </script>
