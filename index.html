    <style>
      /* ━━━ LOADER WRAPPER — transparent, overlay ━━━ */
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Playfair Display', Georgia, serif;
        background: transparent;
        z-index: 9999;
        overflow: hidden;
        text-align: center;
        pointer-events: none;
      }

      /* Soft frosted backdrop */
      #app-loader::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at center, rgba(30,20,40,0.92) 0%, rgba(10,8,13,0.97) 70%);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        z-index: -1;
      }

      /* ━━━ STAGE ━━━ */
      .l-stage {
        position: relative;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        gap: 4px;
        width: 280px;
        height: 160px;
        z-index: 2;
      }

      /* ━━━ SILHOUETTES — bright, high contrast ━━━ */
      .l-figure { flex-shrink: 0; will-change: transform, opacity; }
      .l-figure img {
        display: block;
        width: 115px;
        height: auto;
      }

      /* Groom: warm cream/gold tint — highly visible */
      .l-groom img {
        filter: brightness(0) invert(1) sepia(0.15) saturate(1.5) hue-rotate(15deg) brightness(0.95) drop-shadow(0 4px 20px rgba(212,175,106,0.5));
      }
      .l-groom {
        opacity: 0;
        animation: l-groom-walk 1.8s cubic-bezier(0.22,0.61,0.36,1) 0.3s both;
      }
      @keyframes l-groom-walk {
        0%   { opacity: 0; transform: translateX(-280px); }
        8%   { opacity: 1; }
        30%  { transform: translateX(-160px) translateY(-5px); }
        55%  { transform: translateX(-60px) translateY(0); }
        80%  { transform: translateX(-10px) translateY(-2px); }
        100% { opacity: 1; transform: translateX(0) translateY(0); }
      }

      /* Bride: soft lavender/white — highly visible */
      .l-bride img {
        filter: brightness(0) invert(1) sepia(0.1) saturate(0.8) hue-rotate(260deg) brightness(1) drop-shadow(0 4px 20px rgba(196,160,210,0.5));
      }
      .l-bride {
        opacity: 0;
        animation: l-bride-walk 1.8s cubic-bezier(0.22,0.61,0.36,1) 0.3s both;
      }
      @keyframes l-bride-walk {
        0%   { opacity: 0; transform: translateX(280px); }
        8%   { opacity: 1; }
        30%  { transform: translateX(160px) translateY(-5px); }
        55%  { transform: translateX(60px) translateY(0); }
        80%  { transform: translateX(10px) translateY(-2px); }
        100% { opacity: 1; transform: translateX(0) translateY(0); }
      }

      /* ━━━ MEETING — heart + ring pulse ━━━ */
      .l-meeting {
        position: absolute;
        bottom: 20px;
        left: 50%;
        width: 0; height: 0;
        z-index: 10;
      }

      .l-heart {
        position: absolute;
        top: 0; left: 0;
        transform: translate(-50%,-50%);
        font-size: 1.6rem;
        opacity: 0;
        will-change: transform, opacity;
        filter: drop-shadow(0 0 14px rgba(220,120,160,0.9)) drop-shadow(0 0 36px rgba(220,120,160,0.4));
        animation: l-heart-bloom 0.8s cubic-bezier(0.34,1.56,0.64,1) 2.15s both;
      }
      @keyframes l-heart-bloom {
        0%   { opacity: 0; transform: translate(-50%,-50%) scale(0) rotate(-20deg); }
        60%  { opacity: 1; transform: translate(-50%,-50%) scale(1.5) rotate(5deg); }
        100% { opacity: 1; transform: translate(-50%,-50%) scale(1) rotate(0deg); }
      }

      /* Rings expanding outward from heart */
      .l-ring {
        position: absolute;
        top: 0; left: 0;
        width: 80px; height: 80px;
        border-radius: 50%;
        border: 1px solid rgba(212,175,106,0.5);
        transform: translate(-50%,-50%) scale(0);
        opacity: 0;
        animation: l-ring-expand 1.2s ease-out var(--delay, 2.2s) both;
      }
      .l-ring:nth-child(2) { --delay: 2.35s; width: 120px; height: 120px; border-color: rgba(196,160,210,0.3); }
      .l-ring:nth-child(3) { --delay: 2.5s; width: 160px; height: 160px; border-color: rgba(212,175,106,0.15); }
      @keyframes l-ring-expand {
        0%   { opacity: 0; transform: translate(-50%,-50%) scale(0); }
        30%  { opacity: 0.8; }
        100% { opacity: 0; transform: translate(-50%,-50%) scale(1); }
      }

      /* Sparkles */
      .l-spark {
        position: absolute;
        top: 0; left: 0;
        color: #d4af6a;
        opacity: 0;
        will-change: transform, opacity;
        animation: l-spark-fly var(--dur, 0.85s) ease-out var(--delay, 2.1s) both;
      }
      @keyframes l-spark-fly {
        0%   { opacity: 0; transform: translate(-50%,-50%) translate(0,0) scale(0.4); }
        20%  { opacity: 1; }
        100% { opacity: 0; transform: translate(-50%,-50%) translate(var(--tx),var(--ty)) scale(0); }
      }
      .l-s1 { font-size:.7rem; --dur:.9s; --delay:2.2s; --tx:-48px; --ty:-58px; }
      .l-s2 { font-size:.7rem; --dur:.85s; --delay:2.23s; --tx:46px; --ty:-54px; }
      .l-s3 { font-size:.45rem; --dur:.8s; --delay:2.26s; --tx:-66px; --ty:-14px; }
      .l-s4 { font-size:.45rem; --dur:.8s; --delay:2.29s; --tx:66px; --ty:-16px; }
      .l-s5 { font-size:.6rem; --dur:.95s; --delay:2.18s; --tx:-20px; --ty:-72px; }
      .l-s6 { font-size:.4rem; --dur:.9s; --delay:2.32s; --tx:22px; --ty:-70px; }

      .l-bg { display: none; }

      /* ━━━ GROUND LINE ━━━ */
      .l-line {
        position: relative;
        z-index: 2;
        height: 1px;
        width: 0;
        opacity: 0;
        background: linear-gradient(90deg, transparent 0%, rgba(212,175,106,0.8) 30%, rgba(240,210,100,1) 50%, rgba(212,175,106,0.8) 70%, transparent 100%);
        box-shadow: 0 0 12px rgba(212,175,106,0.4);
        animation: l-line-draw 0.9s ease-out 2.4s both;
      }
      @keyframes l-line-draw {
        0%   { width: 0; opacity: 0; }
        15%  { opacity: 0.9; }
        100% { width: 290px; opacity: 0.6; }
      }

      /* ━━━ TEXT ━━━ */
      .l-text {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.3rem;
        margin-top: 1.6rem;
        z-index: 2;
      }

      #app-loader h1 {
        display: flex;
        align-items: baseline;
        gap: 0.25em;
        margin: 0;
        font-size: 2.6rem;
        font-weight: 600;
        letter-spacing: 0.01em;
        line-height: 1;
      }

      .l-n1 {
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        background-image: linear-gradient(135deg, #ffffff 0%, #e8d5f0 100%);
        opacity: 0;
        animation: l-from-left 0.8s ease-out 2.6s both;
      }
      @keyframes l-from-left {
        from { opacity: 0; transform: translateX(-20px); }
        to   { opacity: 1; transform: translateX(0); }
      }

      .l-amp {
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        background-image: linear-gradient(135deg, #c8a050 0%, #f0d070 50%, #c8a050 100%);
        font-size: 2rem;
        opacity: 0;
        animation: l-rise 0.6s ease-out 2.9s both;
      }

      .l-n2 {
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        background-image: linear-gradient(135deg, #e8d5f0 0%, #ffffff 100%);
        opacity: 0;
        animation: l-from-right 0.8s ease-out 2.6s both;
      }
      @keyframes l-from-right {
        from { opacity: 0; transform: translateX(20px); }
        to   { opacity: 1; transform: translateX(0); }
      }

      .l-rule {
        width: 0; height: 1px; opacity: 0;
        background: linear-gradient(90deg, transparent, rgba(212,175,106,0.45), transparent);
        animation: l-line-draw 0.5s ease-out 3.2s both;
      }

      .l-date {
        font-family: 'DM Sans','Inter',sans-serif;
        font-size: 0.7rem;
        letter-spacing: 0.45em;
        text-transform: uppercase;
        color: rgba(212,175,106,0.9);
        margin: 0;
        opacity: 0;
        animation: l-rise 0.6s ease-out 3.4s both;
      }

      .l-tagline {
        font-family: 'Playfair Display',Georgia,serif;
        font-style: italic;
        font-size: 0.75rem;
        letter-spacing: 0.18em;
        color: rgba(220,200,240,0.6);
        margin: 0;
        opacity: 0;
        animation: l-rise 0.6s ease-out 3.7s both;
      }

      @keyframes l-rise {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ━━━ LOADER EXIT ━━━ */
      #app-loader {
        animation: l-loader-exit 0.7s ease-in 4.8s both;
      }
      @keyframes l-loader-exit {
        from { opacity: 1; }
        to   { opacity: 0; visibility: hidden; }
      }
    </style>
