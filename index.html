    <!-- CRITICAL: CSS async loader MUST be first to intercept Vite-injected CSS before render-blocking -->
    <script>
      (function(){
        function makeAsync(link){
          if(link.rel==='stylesheet'&&link.href&&!link.dataset.critical){
            link.media='print';
            link.onload=function(){this.media='all';this.onload=null};
          }
        }
        var obs=new MutationObserver(function(m){
          m.forEach(function(mut){
            mut.addedNodes.forEach(function(n){
              if(n.tagName==='LINK')makeAsync(n);
            });
          });
        });
        obs.observe(document.documentElement,{childList:true,subtree:true});
        document.querySelectorAll('link[rel="stylesheet"]').forEach(makeAsync);
      })();
    </script>

    <!-- Google Analytics - deferred to reduce main-thread impact -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {analytics_storage: 'denied', ad_storage: 'denied'});
      var gaLoaded = false;
      function isAnalyticsAllowed() {
        try {
          var consent = localStorage.getItem('invision-cookie-consent');
          if (!consent) return false;
          var prefsRaw = localStorage.getItem('invision-cookie-preferences');
          if (!prefsRaw) return false;
          var prefs = JSON.parse(prefsRaw);
          return !!prefs.analytics;
        } catch (e) {
          return false;
        }
      }
      function loadGA() {
        if (gaLoaded || !isAnalyticsAllowed()) return;
        gaLoaded = true;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-B1MKM2FPV7';
        document.head.appendChild(s);
        gtag('consent', 'update', {analytics_storage: 'granted', ad_storage: 'denied'});
        gtag('js', new Date());
        gtag('config', 'G-B1MKM2FPV7', {send_page_view: false});
      }
      function scheduleLoadGA() {
        if (gaLoaded) return;
        if ('requestIdleCallback' in window) {
          requestIdleCallback(loadGA, {timeout: 4000});
        } else {
          setTimeout(loadGA, 2000);
        }
      }
      if (isAnalyticsAllowed()) {
        scheduleLoadGA();
      }
      window.addEventListener('cookie-consent-updated', function() {
        scheduleLoadGA();
      });
    </script>

    <!-- Service Worker Registration - deferred to reduce main-thread blocking -->
    <script>
      // Use requestIdleCallback to defer SW registration out of critical path
      function registerSW() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('/sw.js').catch(function(){});
        }
      }
      if ('requestIdleCallback' in window) {
        requestIdleCallback(registerSW, { timeout: 5000 });
      } else {
        setTimeout(registerSW, 3000);
      }
    </script>
