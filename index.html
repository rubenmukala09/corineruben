    <!-- Inline critical CSS for immediate FCP -->
    <style>
      #app-loader{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Playfair Display',Georgia,serif;color:#4A3B4E;text-align:center;flex-direction:column;gap:0.75rem;position:relative;overflow:hidden;background:#F9F8F9}
      #app-loader::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(201,169,182,0.4) 0%,rgba(184,169,201,0.3) 40%,transparent 70%);top:-10%;left:-10%;filter:blur(60px);animation:aurora-drift 8s ease-in-out infinite}
      #app-loader::after{content:'';position:absolute;width:450px;height:450px;border-radius:50%;background:radial-gradient(circle,rgba(212,165,165,0.35) 0%,rgba(212,196,224,0.25) 40%,transparent 70%);bottom:-15%;right:-10%;filter:blur(70px);animation:aurora-drift 10s ease-in-out infinite reverse}
      @keyframes aurora-drift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-20px) scale(1.08)}}
      @keyframes pulse-glow{0%,100%{opacity:0.6;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}
      @keyframes fade-up{0%{opacity:0;transform:translateY(16px)}100%{opacity:1;transform:translateY(0)}}
      .loader-card{background:rgba(255,255,255,0.25);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.35);border-radius:2rem;padding:3rem 3.5rem;position:relative;z-index:2;box-shadow:0 8px 32px rgba(74,59,78,0.08),inset 0 1px 0 rgba(255,255,255,0.4);animation:fade-up 0.8s ease-out both}
      .loader-heart{font-size:1.5rem;color:#C9A9B6;animation:pulse-glow 2s ease-in-out infinite;margin-bottom:0.25rem}
      #app-loader h1{font-size:2.75rem;font-weight:600;letter-spacing:-0.5px;margin:0;background:linear-gradient(135deg,#4A3B4E 0%,#9F82A4 50%,#6B4E71 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:fade-up 0.8s ease-out 0.15s both}
      #app-loader .loader-date{font-family:'DM Sans','Inter',sans-serif;font-size:0.8rem;letter-spacing:0.35em;text-transform:uppercase;color:#9F82A4;margin:0;animation:fade-up 0.8s ease-out 0.3s both}
      .loader-line{width:60px;height:1px;background:linear-gradient(90deg,transparent,rgba(191,163,122,0.5),transparent);margin:0.5rem auto;animation:fade-up 0.8s ease-out 0.25s both}
      @media(prefers-color-scheme:dark){
        #app-loader{background:#141019;color:#e8e0ec}
        #app-loader::before{background:radial-gradient(circle,rgba(139,107,138,0.3) 0%,rgba(107,78,113,0.25) 40%,transparent 70%)}
        #app-loader::after{background:radial-gradient(circle,rgba(212,165,165,0.2) 0%,rgba(148,120,165,0.2) 40%,transparent 70%)}
        .loader-card{background:rgba(30,24,38,0.5);border-color:rgba(255,255,255,0.08);box-shadow:0 8px 32px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.05)}
        #app-loader h1{background:linear-gradient(135deg,#e8e0ec 0%,#b8a9c9 50%,#9478a5 100%);-webkit-background-clip:text;background-clip:text}
        #app-loader .loader-date{color:#b8a9c9}
        .loader-heart{color:#9478a5}
        .loader-line{background:linear-gradient(90deg,transparent,rgba(191,163,122,0.3),transparent)}
      }
    </style>
