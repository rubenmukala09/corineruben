    <!-- Critical CSS inlined for FCP/LCP -->
    <style>
      *,*::before,*::after{box-sizing:border-box;border-width:0;border-style:solid}
      html{line-height:1.5;-webkit-text-size-adjust:100%;font-family:Outfit,ui-sans-serif,system-ui,sans-serif}
      body{margin:0;line-height:inherit;background-color:#fff;color:#0f172a}
      #root{min-height:100vh;display:flex;flex-direction:column}
      .fixed{position:fixed}.relative{position:relative}.flex{display:flex}.hidden{display:none}
      .h-screen{height:100vh}.w-full{width:100%}.min-h-screen{min-height:100vh}
      .items-center{align-items:center}.justify-center{justify-content:center}
      .overflow-hidden{overflow:hidden}.z-50{z-index:50}
      .bg-primary{background-color:#7c3aed}.text-white{color:#fff}
      .bg-background{background-color:#fff}
      /* Hero LCP styles - ensure fast text paint */
      h1{font-weight:700;line-height:.95;letter-spacing:-.025em}
      @media(min-width:640px){h1{font-size:2.25rem}}
      @media(min-width:768px){h1{font-size:3rem}}
      @media(min-width:1024px){h1{font-size:3.75rem}}
      /* LCP paragraph - critical for immediate paint */
      .lcp-text{font-size:clamp(1rem,2vw,1.5rem);color:#64748b;line-height:1.6;margin:0 0 2rem}
    </style>
    
    <!-- CSS async loader - makes main CSS non-render-blocking -->
    <script>
      (function(){
        var l=function(h){var s=document.createElement('link');s.rel='stylesheet';s.href=h;s.media='print';s.onload=function(){this.media='all'};document.head.appendChild(s)};
        window.__loadCSS=l;
      })();
    </script>
    
    <!-- Modulepreload for main bundle - reduces chain latency -->
    <link rel="modulepreload" href="/src/main.tsx">
    
    <!-- Font loading - non-blocking -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"></noscript>

  <body>
    <div id="root">

    <!-- Service Worker Registration - deferred to reduce main-thread blocking -->
    <script>
      // Use requestIdleCallback to defer SW registration out of critical path
      function registerSW() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('/sw.js').catch(function(){});
        }
      }
      if ('requestIdleCallback' in window) {
        requestIdleCallback(registerSW, { timeout: 5000 });
      } else {
        setTimeout(registerSW, 3000);
      }
    </script>

    <script type="module" src="/src/main.tsx"></script>
