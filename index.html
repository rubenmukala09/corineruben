      /* System font stack for instant text paint - prevents layout shift */
      @font-face {
        font-family: "Rubik";
        font-style: normal;
        font-weight: 400 800;
        font-display: optional;
        src: local("Rubik"), local("Rubik-Regular");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;

      @font-face {
        font-family: "Lora";
        font-style: normal;
        font-weight: 400 700;
        font-display: optional;
        src: local("Lora"), local("Lora-Regular");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        border-width: 0;
        border-style: solid;
      }
      html {
        line-height: 1.5;
        -webkit-text-size-adjust: 100%;

      img, video, iframe {

      nav {

      h1 {

        line-height: 0.95;
        letter-spacing: -0.025em;

      @media (min-width: 640px) {

    <!-- Google Analytics - deferred to reduce main-thread impact -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("consent", "default", {
        analytics_storage: "denied",
        ad_storage: "denied",
      });
      var gaLoaded = false;
      function isAnalyticsAllowed() {
        try {
          var consent = localStorage.getItem("invision-cookie-consent");
          if (!consent) return false;
          var prefsRaw = localStorage.getItem("invision-cookie-preferences");
          if (!prefsRaw) return false;
          var prefs = JSON.parse(prefsRaw);
          return !!prefs.analytics;
        } catch (e) {
          return false;
        }
      }
      function loadGA() {
        if (gaLoaded || !isAnalyticsAllowed()) return;
        gaLoaded = true;
        var s = document.createElement("script");
        s.async = true;
        s.src = "https://www.googletagmanager.com/gtag/js?id=G-B1MKM2FPV7";
        document.head.appendChild(s);
        gtag("consent", "update", {
          analytics_storage: "granted",
          ad_storage: "denied",
        });
        gtag("js", new Date());
        gtag("config", "G-B1MKM2FPV7", { send_page_view: false });
      }
      function scheduleLoadGA() {
        if (gaLoaded) return;
        if ("requestIdleCallback" in window) {
          requestIdleCallback(loadGA, { timeout: 4000 });
        } else {
          setTimeout(loadGA, 2000);
        }
      }
      if (isAnalyticsAllowed()) {
        scheduleLoadGA();
      }
      window.addEventListener("cookie-consent-updated", function () {
        scheduleLoadGA();
      });
    </script>

    <!-- Font loading optimization script -->
    <script>
      // Detect when fonts are loaded to prevent FOUT
      if ('fonts' in document) {
        Promise.all([
          document.fonts.load('400 1rem Rubik'),
          document.fonts.load('600 1rem Rubik'),
          document.fonts.load('700 1rem Rubik')
        ]).then(function() {
          document.documentElement.classList.add('fonts-loaded');
        }).catch(function() {
          // Fallback if font loading fails
          document.documentElement.classList.add('fonts-loaded');
        });

        // Timeout fallback
        setTimeout(function() {
          document.documentElement.classList.add('fonts-loaded');
        }, 1500);
      } else {
        // Browsers without Font Loading API
        document.documentElement.classList.add('fonts-loaded');
      }
    </script>
