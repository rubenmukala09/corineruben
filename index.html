    <!-- Inline critical CSS for immediate FCP -->
    <style>
      #app-loader{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Playfair Display',Georgia,serif;color:#4A3B4E;text-align:center;flex-direction:column;gap:0;position:relative;overflow:hidden;
        background:transparent;
        backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}

      /* ── Figures container ── */
      .loader-figures{display:flex;align-items:flex-end;justify-content:center;gap:0;position:relative;z-index:2;min-height:180px}

      /* ── Each figure ── */
      .loader-figure{display:flex;flex-direction:column;align-items:center;gap:0;opacity:0;position:relative}
      .loader-figure img{width:110px;height:auto;position:relative;z-index:3;
        filter:brightness(0) saturate(100%) invert(18%) sepia(30%) saturate(1500%) hue-rotate(260deg) brightness(0.7);
        }
      .loader-figure-name{font-family:'Playfair Display',Georgia,serif;font-size:1.3rem;font-weight:700;
        color:rgba(74,59,78,0.5);letter-spacing:0.08em;opacity:0;
        position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);z-index:1;
        pointer-events:none}

      /* Groom slides in from left */
      .loader-figure--groom{animation:slide-from-left 1.2s ease-out 0.2s forwards}
      /* Bride slides in from right */
      .loader-figure--bride{animation:slide-from-right 1.2s ease-out 0.2s forwards}

      @keyframes slide-from-left{0%{opacity:0;transform:translateX(-80px)}100%{opacity:1;transform:translateX(0)}}
      @keyframes slide-from-right{0%{opacity:0;transform:translateX(80px)}100%{opacity:1;transform:translateX(0)}}

      /* Names fade in behind figures */
      .loader-figure--groom .loader-figure-name{animation:name-reveal 0.6s ease-out 1.5s forwards}
      .loader-figure--bride .loader-figure-name{animation:name-reveal 0.6s ease-out 1.6s forwards}
      @keyframes name-reveal{0%{opacity:0;transform:translate(-50%,-50%) scale(0.8)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}

      /* ── Walking line ── */
      .loader-walk-line{width:280px;height:2px;margin-top:-2px;opacity:0;
        background:linear-gradient(90deg,transparent 5%,#4A3B4E 30%,#4A3B4E 70%,transparent 95%);
        animation:fade-up 0.8s ease-out 1.4s forwards;position:relative;z-index:2}

      /* ── Heart between them ── */
      .loader-heart{font-size:1.2rem;color:#4A3B4E;opacity:0;position:relative;z-index:3;margin-top:0.5rem;
        animation:heart-pop 0.5s ease-out 1.8s forwards}
      @keyframes heart-pop{0%{opacity:0;transform:scale(0)}60%{opacity:1;transform:scale(1.3)}100%{opacity:1;transform:scale(1)}}

      /* ── Bottom text ── */
      .loader-bottom{display:flex;flex-direction:column;align-items:center;gap:0.25rem;margin-top:0.5rem;position:relative;z-index:3}
      #app-loader h1{font-size:2.2rem;font-weight:600;letter-spacing:-0.5px;margin:0;opacity:0;
        background:linear-gradient(135deg,#4A3B4E 0%,#6B4E71 100%);
        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
        animation:fade-up 0.7s ease-out 2s forwards}
      .loader-divider{width:60px;height:1px;opacity:0;
        background:linear-gradient(90deg,transparent,rgba(74,59,78,0.4),transparent);
        animation:fade-up 0.6s ease-out 2.1s forwards}
      #app-loader .loader-date{font-family:'DM Sans','Inter',sans-serif;font-size:0.75rem;letter-spacing:0.35em;text-transform:uppercase;color:#6B4E71;margin:0;opacity:0;
        animation:fade-up 0.6s ease-out 2.2s forwards}

      @keyframes fade-up{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}

      /* ── DARK MODE ── */
      @media(prefers-color-scheme:dark){
        .loader-figure img{filter:brightness(0.5) sepia(0.4) hue-rotate(260deg) saturate(2.5) contrast(1.3) invert(0.85)}
        .loader-figure-name{color:#d4c8e0;text-shadow:0 0 20px rgba(0,0,0,0.5),0 0 40px rgba(0,0,0,0.3)}
        .loader-walk-line{background:linear-gradient(90deg,transparent 5%,#b8a9c9 30%,#b8a9c9 70%,transparent 95%)}
        .loader-heart{color:#b8a9c9}
        #app-loader h1{background:linear-gradient(135deg,#e8e0ec 0%,#b8a9c9 100%);-webkit-background-clip:text;background-clip:text}
        .loader-divider{background:linear-gradient(90deg,transparent,rgba(184,169,201,0.4),transparent)}
        #app-loader .loader-date{color:#b8a9c9}
      }
    </style>

  <body>
    <div id="root">
      <div id="app-loader" aria-hidden="true">
        <!-- Silhouette figures sliding in -->
        <div class="loader-figures">
          <div class="loader-figure loader-figure--groom">
            <img src="/images/groom-silhouette.png" alt="Groom" />
          </div>
          <div class="loader-figure loader-figure--bride">
            <img src="/images/bride-silhouette.png" alt="Bride" />
          </div>
        </div>
        <!-- Walking line -->
        <div class="loader-walk-line"></div>
        <!-- Heart -->
        <div class="loader-heart">♥</div>
        <!-- Bottom text -->
        <div class="loader-bottom">
          <h1>Corine &amp; Ruben</h1>
          <div class="loader-divider"></div>
          <p class="loader-date">15 . 08 . 2027</p>
