    <!-- Inline critical CSS for immediate FCP -->
    <style>
      #app-loader{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Playfair Display',Georgia,serif;color:#4A3B4E;text-align:center;flex-direction:column;gap:0;position:relative;overflow:hidden;background:linear-gradient(135deg,#fdf6f0 0%,#f3e8f0 50%,#ede4f3 100%)}
      .loader-couple{display:flex;align-items:center;justify-content:center;gap:0;position:relative;height:80px;width:280px}
      .loader-groom,.loader-bride{font-size:2.8rem;position:absolute;top:50%;transform:translateY(-50%);animation-fill-mode:forwards;animation-timing-function:cubic-bezier(0.4,0,0.2,1)}
      .loader-groom{left:0;animation:slide-groom 2s forwards}
      .loader-bride{right:0;animation:slide-bride 2s forwards}
      .loader-heart-pop{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(0);font-size:1.6rem;color:#C9A9B6;opacity:0;animation:heart-pop 1s 2s forwards}
      .loader-glow{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:60px;height:60px;border-radius:50%;background:radial-gradient(circle,rgba(201,169,182,0.4) 0%,transparent 70%);opacity:0;animation:glow-in 1.2s 1.8s forwards}
      .loader-names{font-size:2rem;font-weight:600;letter-spacing:-0.5px;margin-top:1.2rem;opacity:0;
        background:linear-gradient(135deg,#4A3B4E 0%,#9F82A4 50%,#6B4E71 100%);
        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
        animation:fade-up 1s 2.4s forwards}
      .loader-sub{font-family:'DM Sans',sans-serif;font-size:0.75rem;letter-spacing:0.35em;text-transform:uppercase;color:#9F82A4;opacity:0;margin-top:0.4rem;animation:fade-up 1s 2.8s forwards}

      @keyframes slide-groom{0%{left:0;opacity:0}30%{opacity:1}100%{left:calc(50% - 36px);opacity:1}}
      @keyframes slide-bride{0%{right:0;opacity:0}30%{opacity:1}100%{right:calc(50% - 36px);opacity:1}}
      @keyframes heart-pop{0%{transform:translate(-50%,-50%) scale(0);opacity:0}50%{transform:translate(-50%,-50%) scale(1.3);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
      @keyframes glow-in{0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}50%{opacity:1}100%{opacity:0.6;transform:translate(-50%,-50%) scale(1.2)}}
      @keyframes fade-up{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}

      @media(prefers-color-scheme:dark){
        #app-loader{background:linear-gradient(135deg,#0a080f 0%,#1a1225 50%,#120e1a 100%);color:#e8e0ec}
        .loader-heart-pop{color:#9478a5}
        .loader-glow{background:radial-gradient(circle,rgba(148,120,165,0.3) 0%,transparent 70%)}
        .loader-names{background:linear-gradient(135deg,#e8e0ec 0%,#b8a9c9 50%,#9478a5 100%);-webkit-background-clip:text;background-clip:text}
        .loader-sub{color:#b8a9c9}
      }
    </style>
