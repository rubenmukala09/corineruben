    <!-- Inline critical CSS for immediate FCP -->
    <style>
      #app-loader{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Playfair Display',Georgia,serif;color:#4A3B4E;text-align:center;flex-direction:column;gap:0.75rem;position:relative;overflow:hidden;background:#F9F8F9}

      /* ── Central spectrum bubble — plum/rose/lavender only ── */
      .spectrum-blob{position:absolute;width:420px;height:420px;border-radius:50%;opacity:0.7;z-index:1;
        background:conic-gradient(from 0deg,
          hsl(300,45%,72%),hsl(330,50%,74%),hsl(290,40%,76%),
          hsl(270,45%,70%),hsl(310,42%,75%),hsl(340,48%,72%),
          hsl(300,45%,72%));
        filter:blur(45px);
        animation:morph 8s ease-in-out infinite, spectrum-pulse 4s ease-in-out infinite}

      @keyframes morph{
        0%,100%{border-radius:60% 40% 30% 70%/60% 30% 70% 40%;transform:translate(0,0)}
        25%{border-radius:30% 60% 70% 40%/50% 60% 30% 60%;transform:translate(18px,-12px)}
        50%{border-radius:50% 60% 30% 60%/30% 40% 70% 60%;transform:translate(-12px,18px)}
        75%{border-radius:40% 50% 60% 50%/60% 30% 50% 70%;transform:translate(12px,8px)}
      }
      @keyframes spectrum-pulse{0%,100%{transform:scale(1);opacity:0.65}50%{transform:scale(1.1);opacity:0.8}}

      /* ── Ripple rings expanding from center ── */
      .ripple-ring{position:absolute;border-radius:50%;border:1px solid rgba(201,169,182,0.3);z-index:1;pointer-events:none;animation:ripple-expand 4s ease-out infinite}
      .ripple-ring:nth-child(2){animation-delay:1.3s}
      .ripple-ring:nth-child(3){animation-delay:2.6s}
      @keyframes ripple-expand{
        0%{width:80px;height:80px;opacity:0.6}
        100%{width:600px;height:600px;opacity:0}
      }

      /* ── Floating aurora blobs ── */
      .aurora-1,.aurora-2,.aurora-3,.aurora-4{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
      .aurora-1{width:500px;height:420px;top:-15%;left:-12%;background:radial-gradient(circle,rgba(201,169,182,0.5) 0%,rgba(184,169,201,0.35) 40%,transparent 70%);animation:aurora-float1 10s ease-in-out infinite}
      .aurora-2{width:440px;height:360px;bottom:-12%;right:-14%;background:radial-gradient(circle,rgba(212,165,165,0.45) 0%,rgba(178,145,200,0.3) 40%,transparent 70%);animation:aurora-float2 13s ease-in-out infinite}
      .aurora-3{width:320px;height:320px;top:28%;left:48%;transform:translateX(-50%);background:radial-gradient(circle,rgba(220,190,210,0.4) 0%,rgba(190,170,220,0.25) 50%,transparent 70%);animation:aurora-float3 9s ease-in-out infinite}
      .aurora-4{width:280px;height:280px;top:10%;right:5%;background:radial-gradient(circle,rgba(232,196,184,0.4) 0%,rgba(220,180,200,0.2) 50%,transparent 70%);animation:aurora-float1 15s ease-in-out infinite reverse}

      @keyframes aurora-float1{0%,100%{transform:translate(0,0) scale(1);opacity:0.6}50%{transform:translate(45px,-28px) scale(1.14);opacity:0.82}}
      @keyframes aurora-float2{0%,100%{transform:translate(0,0) scale(1);opacity:0.5}50%{transform:translate(-35px,22px) scale(1.12);opacity:0.78}}
      @keyframes aurora-float3{0%,100%{transform:translateX(-50%) scale(1);opacity:0.4}50%{transform:translateX(-50%) scale(1.18) translateY(-18px);opacity:0.68}}

      /* ── Glassmorphism card ── */
      @keyframes fade-up{0%{opacity:0;transform:translateY(24px)}100%{opacity:1;transform:translateY(0)}}
      @keyframes pulse-glow{0%,100%{opacity:0.6;transform:scale(1)}50%{opacity:1;transform:scale(1.2)}}
      @keyframes card-shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

      .loader-card{
        background:rgba(255,255,255,0.18);
        backdrop-filter:blur(36px);-webkit-backdrop-filter:blur(36px);
        border:1px solid rgba(255,255,255,0.45);
        border-radius:2.5rem;padding:3rem 3.5rem;
        position:relative;z-index:3;
        box-shadow:
          0 8px 40px rgba(74,59,78,0.12),
          0 0 80px rgba(201,169,182,0.18),
          inset 0 1px 0 rgba(255,255,255,0.6),
          inset 0 -1px 0 rgba(255,255,255,0.1);
        animation:fade-up 0.9s ease-out both}

      /* Shimmer sweep across card */
      .loader-card::after{
        content:'';position:absolute;inset:0;border-radius:2.5rem;
        background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.25) 50%,transparent 60%);
        background-size:200% 100%;
        animation:card-shimmer 3s ease-in-out infinite;
        pointer-events:none}

      .loader-heart{font-size:1.6rem;color:#C9A9B6;animation:pulse-glow 2s ease-in-out infinite;margin-bottom:0.25rem}
      #app-loader h1{font-size:2.75rem;font-weight:600;letter-spacing:-0.5px;margin:0;background:linear-gradient(135deg,#4A3B4E 0%,#9F82A4 50%,#6B4E71 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:fade-up 0.9s ease-out 0.15s both}
      #app-loader .loader-date{font-family:'DM Sans','Inter',sans-serif;font-size:0.8rem;letter-spacing:0.35em;text-transform:uppercase;color:#9F82A4;margin:0;animation:fade-up 0.9s ease-out 0.35s both}
      .loader-line{width:60px;height:1px;background:linear-gradient(90deg,transparent,rgba(191,163,122,0.5),transparent);margin:0.5rem auto;animation:fade-up 0.9s ease-out 0.25s both}

      /* ── SVG waves ── */
      .loader-waves{position:absolute;bottom:0;left:0;width:100%;height:140px;z-index:2;overflow:hidden}
      .loader-waves svg{position:absolute;bottom:-5px;left:0;width:200%;height:100%}
      .wave-1{animation:wave-drift 6s ease-in-out infinite}
      .wave-2{animation:wave-drift 8s ease-in-out infinite reverse;opacity:0.6}
      .wave-3{animation:wave-drift 10s ease-in-out infinite;opacity:0.35}
      @keyframes wave-drift{0%,100%{transform:translateX(0)}50%{transform:translateX(-25%)}}

      /* ── Tiny floating particles ── */
      .loader-particle{position:absolute;width:3px;height:3px;border-radius:50%;background:rgba(201,169,182,0.5);z-index:2;animation:particle-float 6s ease-in-out infinite}
      .loader-particle:nth-child(1){left:15%;top:20%;animation-delay:0s;animation-duration:7s}
      .loader-particle:nth-child(2){left:75%;top:35%;animation-delay:1s;animation-duration:5s}
      .loader-particle:nth-child(3){left:40%;top:70%;animation-delay:2s;animation-duration:8s}
      .loader-particle:nth-child(4){left:85%;top:15%;animation-delay:0.5s;animation-duration:6s}
      .loader-particle:nth-child(5){left:25%;top:80%;animation-delay:1.5s;animation-duration:9s}
      .loader-particle:nth-child(6){left:60%;top:55%;animation-delay:3s;animation-duration:7s}
      @keyframes particle-float{
        0%,100%{transform:translateY(0) scale(1);opacity:0.3}
        50%{transform:translateY(-30px) scale(1.5);opacity:0.7}
      }

      /* ── DARK MODE ── */
      @media(prefers-color-scheme:dark){
        #app-loader{background:#141019;color:#e8e0ec}
        .spectrum-blob{opacity:0.6;
          background:conic-gradient(from 0deg,
            hsl(300,45%,50%),hsl(330,50%,54%),hsl(290,40%,52%),
            hsl(270,42%,50%),hsl(310,40%,53%),hsl(340,48%,50%),
            hsl(300,45%,50%))}
        .aurora-1{background:radial-gradient(circle,rgba(160,120,170,0.5) 0%,rgba(130,100,160,0.35) 40%,transparent 70%)}
        .aurora-2{background:radial-gradient(circle,rgba(200,140,150,0.4) 0%,rgba(160,130,180,0.3) 40%,transparent 70%)}
        .aurora-3{background:radial-gradient(circle,rgba(170,140,190,0.4) 0%,rgba(150,120,180,0.25) 50%,transparent 70%)}
        .aurora-4{background:radial-gradient(circle,rgba(190,150,170,0.35) 0%,rgba(170,130,190,0.2) 50%,transparent 70%)}
        .ripple-ring{border-color:rgba(160,120,180,0.25)}
        .loader-card{background:rgba(30,24,38,0.5);border-color:rgba(255,255,255,0.12);box-shadow:0 8px 40px rgba(0,0,0,0.35),0 0 60px rgba(140,100,160,0.15),inset 0 1px 0 rgba(255,255,255,0.08)}
        .loader-card::after{background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.08) 50%,transparent 60%);background-size:200% 100%}
        #app-loader h1{background:linear-gradient(135deg,#e8e0ec 0%,#b8a9c9 50%,#9478a5 100%);-webkit-background-clip:text;background-clip:text}
        #app-loader .loader-date{color:#b8a9c9}
        .loader-heart{color:#9478a5}
        .loader-line{background:linear-gradient(90deg,transparent,rgba(191,163,122,0.3),transparent)}
        .loader-particle{background:rgba(160,120,180,0.5)}
        .wave-fill-1{fill:rgba(140,100,160,0.15)}
        .wave-fill-2{fill:rgba(160,120,170,0.1)}
        .wave-fill-3{fill:rgba(130,100,150,0.06)}
      }
    </style>
