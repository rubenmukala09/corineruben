<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphism Loading Widget</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      overflow: hidden;
    }

    /* Full screen background with radial gradients */
    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 20% 30%, rgba(186, 129, 181, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(248, 146, 106, 0.12) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(109, 40, 217, 0.08) 0%, transparent 70%),
        linear-gradient(135deg, #faf9f7 0%, #f5f3f0 100%);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* Frosted glass card */
    .loading-card {
      width: clamp(220px, 40vw, 280px);
      height: clamp(220px, 40vw, 280px);
      border-radius: 24px;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.4) 0%,
        rgba(255, 255, 255, 0.25) 100%
      );
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow:
        0 8px 32px 0 rgba(31, 38, 135, 0.12),
        0 20px 60px 0 rgba(109, 40, 217, 0.08),
        inset 0 1px 1px 0 rgba(255, 255, 255, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    /* Subtle shimmer effect on card */
    .loading-card::before {
      content: '';
      position: absolute;
      inset: -2px;
      background: linear-gradient(
        45deg,
        transparent 0%,
        rgba(255, 255, 255, 0.1) 50%,
        transparent 100%
      );
      background-size: 200% 200%;
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* Loader container */
    .loader-container {
      position: relative;
      width: 120px;
      height: 120px;
      z-index: 1;
    }

    /* SVG rings */
    .loader-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring {
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
    }

    .ring-lavender-1 {
      stroke: rgba(186, 129, 181, 0.4);
      stroke-dasharray: 283;
      stroke-dashoffset: 0;
      animation: spin 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    .ring-lavender-2 {
      stroke: rgba(186, 129, 181, 0.3);
      stroke-dasharray: 226;
      stroke-dashoffset: 0;
      animation: spin 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite reverse;
    }

    .ring-peach {
      stroke: rgba(248, 146, 106, 0.5);
      stroke-dasharray: 188;
      stroke-dashoffset: 0;
      animation: spin 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    @keyframes spin {
      0% {
        stroke-dashoffset: 0;
        transform: rotate(0deg);
      }
      50% {
        stroke-dashoffset: -70;
      }
      100% {
        stroke-dashoffset: 0;
        transform: rotate(360deg);
      }
    }

    /* Center glow */
    .center-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(248, 146, 106, 0.4) 0%,
        rgba(248, 146, 106, 0.2) 40%,
        transparent 70%
      );
      filter: blur(8px);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 0.6;
        transform: translate(-50%, -50%) scale(1);
      }
      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.1);
      }
    }

    /* Animated dots */
    .dot {
      fill: rgba(109, 40, 217, 0.7);
      filter: drop-shadow(0 2px 4px rgba(109, 40, 217, 0.3));
    }

    .dot-1 {
      animation: orbit 2s ease-in-out infinite;
      transform-origin: 60px 60px;
    }

    .dot-2 {
      animation: orbit 2s ease-in-out infinite 0.33s;
      transform-origin: 60px 60px;
    }

    .dot-3 {
      animation: orbit 2s ease-in-out infinite 0.66s;
      transform-origin: 60px 60px;
    }

    @keyframes orbit {
      0%, 100% {
        transform: rotate(0deg) translateY(45px);
        opacity: 0.5;
      }
      50% {
        transform: rotate(180deg) translateY(45px);
        opacity: 1;
      }
    }

    /* Loading text */
    .loading-text {
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(71, 85, 105, 0.8);
      z-index: 1;
      margin-top: 0.5rem;
    }

    /* Hidden state */
    .loading-overlay.hidden {
      display: none;
    }

    /* Reduced motion support */
    @media (prefers-reduced-motion: reduce) {
      .loading-card::before,
      .ring-lavender-1,
      .ring-lavender-2,
      .ring-peach,
      .center-glow,
      .dot-1,
      .dot-2,
      .dot-3 {
        animation: none !important;
      }

      .ring {
        stroke-dashoffset: 0 !important;
      }

      .dot {
        opacity: 1 !important;
      }

      .center-glow {
        opacity: 0.8;
        transform: translate(-50%, -50%);
      }
    }

    /* Mobile responsive */
    @media (max-width: 640px) {
      .loading-card {
        width: clamp(200px, 70vw, 240px);
        height: clamp(200px, 70vw, 240px);
        gap: 1rem;
        padding: 1.5rem;
      }

      .loader-container {
        width: 100px;
        height: 100px;
      }

      .loading-text {
        font-size: 0.75rem;
        letter-spacing: 0.2em;
      }
    }
  </style>
</head>
<body>
  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay" role="status" aria-live="polite" aria-label="Loading">
    <div class="loading-card">
      <!-- Loader with rings and dots -->
      <div class="loader-container">
        <!-- Center glow -->
        <div class="center-glow"></div>

        <!-- SVG rings and dots -->
        <svg class="loader-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="glow">
              <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
              <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>

          <!-- Outer lavender ring -->
          <circle
            class="ring ring-lavender-1"
            cx="60"
            cy="60"
            r="45"
            filter="url(#glow)"
          />

          <!-- Middle lavender ring -->
          <circle
            class="ring ring-lavender-2"
            cx="60"
            cy="60"
            r="36"
            filter="url(#glow)"
          />

          <!-- Inner peach ring -->
          <circle
            class="ring ring-peach"
            cx="60"
            cy="60"
            r="30"
            filter="url(#glow)"
          />

          <!-- Animated dots on path -->
          <g transform="rotate(240 60 60)">
            <circle class="dot dot-1" cx="60" cy="15" r="3" />
          </g>
          <g transform="rotate(260 60 60)">
            <circle class="dot dot-2" cx="60" cy="15" r="3" />
          </g>
          <g transform="rotate(280 60 60)">
            <circle class="dot dot-3" cx="60" cy="15" r="3" />
          </g>
        </svg>
      </div>

      <!-- Loading text -->
      <p class="loading-text" aria-hidden="true">Loading</p>
    </div>
  </div>

  <script>
    // Toggle overlay visibility
    function toggleLoading(show) {
      const overlay = document.getElementById('loadingOverlay');
      if (show) {
        overlay.classList.remove('hidden');
      } else {
        overlay.classList.add('hidden');
      }
    }

    // Auto-hide after 3 seconds (demo only)
    // Remove or modify this in production
    setTimeout(() => {
      toggleLoading(false);
    }, 3000);

    // Example: Show loading
    // toggleLoading(true);

    // Example: Hide loading
    // toggleLoading(false);
  </script>
</body>
</html>
